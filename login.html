<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Pembelajaran Histogram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body arcade-skin">
    <header class="topbar sticky-topbar has-hamburger" id="loginTopbar">
        <div class="brand-mark">
            <span class="brand-dot"></span>
            <div>
                <strong>Histogram Digital</strong>
                <p>Masuk pembelajaran</p>
            </div>
        </div>
        <button class="menu-toggle" type="button" id="loginMenuToggle" aria-expanded="false" aria-controls="loginNav" aria-label="Buka menu navigasi">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="topnav nav-drawer" id="loginNav">
            <a href="index.html#tentang-media">Tentang Media</a>
            <a href="index.html#tujuan-pembelajaran">Tujuan Pembelajaran</a>
            <a href="index.html#panduan-penggunaan">Panduan Penggunaan</a>
        </nav>
    </header>
    <div class="topbar-spacer" id="loginTopbarSpacer" aria-hidden="true"></div>

    <main class="landing-main">
        <section class="content-section form-section single-form-section">
            <div class="section-heading">
                <span class="section-kicker">Mulai Belajar</span>
                <h2>Masuk ke akun pembelajaran</h2>
                <p>Gunakan kode akun dari guru atau email yang sudah terdaftar untuk melanjutkan belajar.</p>
            </div>

            <div class="login-shell">
                <form class="login-container modern-login" id="loginForm">
                    <div class="inputBox">
                        <label for="loginIdentifier">Kode Akun / Email</label>
                        <input type="text" id="loginIdentifier" autocomplete="username" placeholder="Contoh: S001 atau nama@email.com">
                    </div>

                    <div class="inputBox">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" autocomplete="current-password" placeholder="Masukkan password">
                    </div>

                    <p class="auth-message" id="authMessage" hidden></p>

                    <button class="button landing-submit" type="submit" id="loginSubmitButton">
                        Masuk
                    </button>

                    <p class="auth-switch">
                        Belum punya akun? <a href="register.html">Daftar</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <script>
        const loginTopbar = document.getElementById("loginTopbar");
        const loginTopbarSpacer = document.getElementById("loginTopbarSpacer");
        const loginMenuToggle = document.getElementById("loginMenuToggle");
        const loginNav = document.getElementById("loginNav");

        function tutupLoginMenu() {
            loginTopbar.classList.remove("menu-open");
            loginMenuToggle.setAttribute("aria-expanded", "false");
        }

        loginMenuToggle.addEventListener("click", () => {
            const isOpen = loginTopbar.classList.toggle("menu-open");
            loginMenuToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        loginNav.querySelectorAll("a").forEach((link) => {
            link.addEventListener("click", () => {
                if (window.innerWidth <= 980) {
                    tutupLoginMenu();
                }
            });
        });

        document.addEventListener("click", (event) => {
            if (window.innerWidth > 980) return;
            if (!loginTopbar.contains(event.target)) {
                tutupLoginMenu();
            }
        });

        window.addEventListener("resize", () => {
            if (window.innerWidth > 980) {
                tutupLoginMenu();
            }
            updateLoginTopbarMetrics();
            toggleLoginTopbar();
        });

        function updateLoginTopbarMetrics() {
            loginTopbarSpacer.style.setProperty("--topbar-space", `${loginTopbar.offsetHeight + 8}px`);
        }

        let loginTopbarFloating = false;

        function toggleLoginTopbar() {
            const shouldFloat = window.scrollY > 12;
            if (shouldFloat === loginTopbarFloating) return;

            loginTopbarFloating = shouldFloat;
            loginTopbar.classList.toggle("is-floating", shouldFloat);
            loginTopbarSpacer.classList.toggle("active", shouldFloat);
            updateLoginTopbarMetrics();
        }

        window.addEventListener("scroll", toggleLoginTopbar, { passive: true });
        updateLoginTopbarMetrics();
        toggleLoginTopbar();

    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
