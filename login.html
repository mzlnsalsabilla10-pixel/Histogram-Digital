<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pembelajaran Histogram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body">
    <header class="topbar sticky-topbar">
        <div class="brand-mark">
            <span class="brand-dot"></span>
            <div>
                <strong>Histogram Digital</strong>
                <p>Login pembelajaran</p>
            </div>
        </div>
        <nav class="topnav">
            <a href="index.html#tentang-media">Tentang Media</a>
            <a href="index.html#tujuan-pembelajaran">Tujuan Pembelajaran</a>
            <a href="index.html#panduan-penggunaan">Panduan Penggunaan</a>
            <a href="index.html#referensi">Referensi</a>
            <a class="topnav-cta" href="login.html">Mulai Belajar</a>
        </nav>
    </header>

    <main class="landing-main">
        <section class="content-section form-section single-form-section">
            <div class="section-heading">
                <span class="section-kicker">Mulai Belajar</span>
                <h2>Isi identitas diri terlebih dahulu</h2>
                <p>Data ini digunakan untuk mencatat proses dan hasil belajar selama menggunakan media.</p>
            </div>

            <div class="login-shell">
                <div class="login-container modern-login">
                    <div class="inputBox">
                        <label>Nama Lengkap</label>
                        <input type="text" id="namaLengkap" placeholder="Masukkan nama lengkap">
                    </div>

                    <div class="inputBox">
                        <label>Nama Kelompok</label>
                        <input type="text" id="kelompokNama" placeholder="Misal: Kelompok Histogram 1">
                    </div>

                    <div class="inputBox">
                        <label>Kelas / Rombel</label>
                        <input type="text" id="kelompokKelas" placeholder="Misal: X-3">
                    </div>

                    <div class="button landing-submit" onclick="mulai()">
                        Masuk ke Beranda Belajar
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        function mulai() {
            let namaLengkap = document.getElementById("namaLengkap").value.trim();
            let nama = document.getElementById("kelompokNama").value.trim();
            let kelas = document.getElementById("kelompokKelas").value.trim();

            if (!namaLengkap || !nama || !kelas) {
                alert("Semua data harus diisi ya!");
                return;
            }

            localStorage.setItem("namaLengkap", namaLengkap);
            localStorage.setItem("kelompokNama", nama);
            localStorage.setItem("kelompokKelas", kelas);
            localStorage.setItem("login", "true");

            window.location.href = "beranda.html";
        }
    </script>
</body>
</html>
