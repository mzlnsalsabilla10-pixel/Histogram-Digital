<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pembelajaran Histogram</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="landing-body arcade-skin">
    <header class="topbar sticky-topbar has-hamburger" id="loginTopbar">
        <div class="brand-mark">
            <span class="brand-dot"></span>
            <div>
                <strong>Histogram Digital</strong>
                <p>Login pembelajaran</p>
            </div>
        </div>
        <button class="menu-toggle" type="button" id="loginMenuToggle" aria-expanded="false" aria-controls="loginNav" aria-label="Buka menu navigasi">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <nav class="topnav nav-drawer" id="loginNav">
            <a href="index.html#tentang-media">Tentang Media</a>
            <a href="index.html#tujuan-pembelajaran">Tujuan Pembelajaran</a>
            <a href="index.html#panduan-penggunaan">Panduan Penggunaan</a>
        </nav>
    </header>
    <div class="topbar-spacer" id="loginTopbarSpacer" aria-hidden="true"></div>

    <main class="landing-main">
        <section class="content-section form-section single-form-section">
            <div class="section-heading">
                <span class="section-kicker">Mulai Belajar</span>
                <h2>Isi identitas diri terlebih dahulu</h2>
                <p>Data ini digunakan untuk mencatat proses dan hasil belajar selama menggunakan media.</p>
            </div>

            <div class="login-shell">
                <form class="login-container modern-login" id="loginForm">
                    <div class="inputBox">
                        <label for="namaLengkap">Nama Lengkap</label>
                        <input type="text" id="namaLengkap" placeholder="Masukkan nama lengkap">
                    </div>

                    <div class="inputBox">
                        <label for="kelompokNama">Nama Kelompok</label>
                        <input type="text" id="kelompokNama" placeholder="Misal: Kelompok Histogram 1">
                    </div>

                    <div class="inputBox">
                        <label for="kelompokKelas">Kelas / Rombel</label>
                        <input type="text" id="kelompokKelas" placeholder="Misal: X-3">
                    </div>

                    <button class="button landing-submit" type="submit">
                        Masuk ke Beranda Belajar
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
        const loginTopbar = document.getElementById("loginTopbar");
        const loginTopbarSpacer = document.getElementById("loginTopbarSpacer");
        const loginMenuToggle = document.getElementById("loginMenuToggle");
        const loginNav = document.getElementById("loginNav");
        const loginForm = document.getElementById("loginForm");

        function tutupLoginMenu() {
            loginTopbar.classList.remove("menu-open");
            loginMenuToggle.setAttribute("aria-expanded", "false");
        }

        loginMenuToggle.addEventListener("click", () => {
            const isOpen = loginTopbar.classList.toggle("menu-open");
            loginMenuToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        loginNav.querySelectorAll("a").forEach((link) => {
            link.addEventListener("click", () => {
                if (window.innerWidth <= 980) {
                    tutupLoginMenu();
                }
            });
        });

        document.addEventListener("click", (event) => {
            if (window.innerWidth > 980) return;
            if (!loginTopbar.contains(event.target)) {
                tutupLoginMenu();
            }
        });

        window.addEventListener("resize", () => {
            if (window.innerWidth > 980) {
                tutupLoginMenu();
            }
            updateLoginTopbarMetrics();
            toggleLoginTopbar();
        });

        function updateLoginTopbarMetrics() {
            loginTopbarSpacer.style.setProperty("--topbar-space", `${loginTopbar.offsetHeight + 8}px`);
        }

        function toggleLoginTopbar() {
            const shouldFloat = window.scrollY > 12;
            loginTopbar.classList.toggle("is-floating", shouldFloat);
            loginTopbarSpacer.classList.toggle("active", shouldFloat);
        }

        window.addEventListener("scroll", toggleLoginTopbar, { passive: true });
        updateLoginTopbarMetrics();
        toggleLoginTopbar();

        function mulai() {
            let namaLengkap = document.getElementById("namaLengkap").value.trim();
            let nama = document.getElementById("kelompokNama").value.trim();
            let kelas = document.getElementById("kelompokKelas").value.trim();

            if (!namaLengkap || !nama || !kelas) {
                alert("Semua data harus diisi ya!");
                return;
            }

            localStorage.setItem("namaLengkap", namaLengkap);
            localStorage.setItem("kelompokNama", nama);
            localStorage.setItem("kelompokKelas", kelas);
            localStorage.setItem("login", "true");

            window.location.href = "beranda.html";
        }

        loginForm.addEventListener("submit", (event) => {
            event.preventDefault();
            mulai();
        });
    </script>
</body>
</html>
